<main class="flex-grow flex items-center justify-center px-gutter pt-16">
<div class="w-full max-w-[440px] glass-panel p-8 rounded-xl shadow-2xl flex flex-col gap-8">

<input class="bg-surface-container border border-outline-variant rounded-lg px-4 py-3 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="email" placeholder="name@company.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">PASSWORD</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">FORGOT?</a>
</div>
<input class="bg-surface-container border border-outline-variant rounded-lg px-4 py-3 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-h2 text-body-md py-3.5 rounded-full font-bold hover:opacity-90 active:scale-[0.98] transition-all mt-2" type="submit">
                    Log In
                </button>
</form>

<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-sm text-label-sm text-outline">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
